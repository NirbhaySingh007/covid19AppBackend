server:
  port: 8085
spring:
  application:
    name: external-api-service
  main:
    web-application-type: reactive
eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_SERVER_IP:localhost}:${EUREKA_SERVER_PORT:8761}/eureka
    fetchRegistry: true
    registerWithEureka: true





