spring:
  application:
    name: MyFavouriteServiceApplication
  main:
    web-application-type: reactive

  autoconfigure:
    exclude:
      org:
        springframework:
          boot:
            autoconfigure:
              jdbc: DataSourceAutoConfiguration

  data:
    mongodb:
      uri: mongodb://localhost:27017/coviddb
      database: coviddb
      host : localhost
      port : 27017

  mvc:
    path match:
      matching-strategy:
        ant-path-matcher

server:
  port: 7072
  error:
    include-message: always
eureka:
  client:
    fetchRegistry: true
    registerWithEureka: true

